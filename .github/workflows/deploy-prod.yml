name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Restore Devvit credentials
        run: |
          mkdir -p ~/.devvit
          echo '${{ secrets.DEVVIT_TOKEN }}' > ~/.devvit/token
          echo '${{ secrets.DEVVIT_SESSION_ID }}' > ~/.devvit/session-id

      - name: Upload to Devvit
        run: npx devvit upload

      - name: Publish to production
        run: npx devvit publish
        # First time: run `npx devvit publish` locally and select
        # "don't ask me again" — after that this runs non-interactively.
