name: PR Playtest

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  preview:
    runs-on: ubuntu-latest
    # Skip if the PR is from dependabot or other bots
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Restore Devvit credentials
        run: |
          mkdir -p ~/.devvit
          echo '${{ secrets.DEVVIT_TOKEN }}' > ~/.devvit/token
          echo '${{ secrets.DEVVIT_SESSION_ID }}' > ~/.devvit/session-id

      - name: Upload to dev playtest
        run: npx devvit upload

      - name: Comment playtest URL
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const body = [
              '## 🎮 Playtest Ready',
              '',
              `Built from \`${sha}\` and uploaded to the dev environment.`,
              '',
              '**Test URL:** https://www.reddit.com/r/nightwatchgame_dev/?playtest=nightwatchgame',
              '',
              '> Requires mod/dev access to `r/nightwatchgame_dev` — ask @anadi45 for an invite if needed.',
              '',
              '_Note: all open PRs share the same dev slot; this link always reflects the most recently uploaded branch._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body.includes('Playtest Ready')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
