<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="game.css" />
  <title>Nightwatch</title>
</head>
<body>
  <div id="loader">
    <div class="loader-flame"></div>
    <p class="loader-text">Lighting the lantern...</p>
  </div>

  <div id="game-container"></div>

  <div id="hud">
    <div id="hud-top">
      <div id="score-display">
        <span class="hud-label">Score</span>
        <span id="score-value">0</span>
      </div>
      <div id="timer-display">
        <span id="timer-value">60</span>
      </div>
      <div id="streak-display">
        <span class="hud-label">Streak</span>
        <span id="streak-value">0</span>
      </div>
    </div>

  </div>

  <div id="ready-screen">
    <h1 class="title">Tonight's Watch</h1>
    <p class="instructions">Creatures flee toward your light for safety.<br/>
      <strong style="color:#44ddff">Blue eyes</strong> — friendly. Let them reach you.<br/>
      <strong style="color:#ff4444">Red eyes</strong> — evil. Tap them to flash your light.</p>
    <button id="btn-start" class="start-btn">Begin Watch</button>
  </div>

  <div id="end-screen" class="hidden">
    <h1 class="title">Watch Complete</h1>
    <div id="end-stats">
      <div class="stat-row"><span class="stat-label">Score</span><span id="end-score">0</span></div>
      <div class="stat-row"><span class="stat-label">Best Streak</span><span id="end-streak">0</span></div>
      <div class="stat-row"><span class="stat-label">Misses</span><span id="end-misses">0</span></div>
      <div class="stat-row"><span class="stat-label">Creatures</span><span id="end-total">0</span></div>
    </div>
    <button id="btn-restart" class="start-btn">Watch Again</button>
  </div>

  <script type="module" src="game.ts"></script>
</body>
</html>
